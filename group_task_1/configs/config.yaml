dataset:
  train_csv: "data/train.csv"
  dev_csv: "data/dev.csv"
  test_csv: "data/test.csv"
  preprocessed_dir: "data/preprocessed"
  sample_rate: 16000
  n_mels: 80
  n_fft: 400
  hop_length: 160
  num_workers: 4
  batch_size: 64

model:
  name: "baseline_crnn"
  vocab_size: 11 # 0-9 digits + 1 blank token for CTC
  hidden_size: 256
  num_layers: 2
  dropout: 0.2

training:
  learning_rate: 0.0003
  weight_decay: 0.00001
  max_epochs: 50
  patience: 10
  gradient_clip_val: 1.0
  precision: "16-mixed"
  devices: 8 # Since you will use 8x H100
  accelerator: "gpu"
  strategy: "ddp"

logging:
  project_name: "asr-spoken-numbers"
  experiment_name: "baseline_crnn_run1"
  save_dir: "checkpoints/"
